[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --disable-warnings
markers =
    unit: Unit tests that don't require external dependencies
    integration: Integration tests that test cross-component functionality
    e2e: End-to-end tests that test the full pipeline
    slow: Slow running tests (>60 seconds)
    config: Configuration and config handler tests
    container: Tests that require containerized components
    pyspark: Tests that require PySpark pipeline
    ray: Tests that require Ray tuner
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:pyspark.*
    ignore::UserWarning:mne.*
    ignore::UserWarning:ray.*


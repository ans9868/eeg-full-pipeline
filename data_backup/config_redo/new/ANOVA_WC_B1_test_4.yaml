project:
  name: ANOVA_WC_B1_test_4
  output_dir: ./data
  experiment_type: ML Classification
  subjects_or_events: subjects
  deployment_method: Docker
  random_seed: 42
  expose_ports: 'No'
  config_name: config_ANOVA_WC_B1_test_4.yaml
data_input:
  groups:
    alz:
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-001/eeg/sub-001_task-eyesclosed_eeg.set
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-002/eeg/sub-002_task-eyesclosed_eeg.set
    cntrl:
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-037/eeg/sub-037_task-eyesclosed_eeg.set
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-038/eeg/sub-038_task-eyesclosed_eeg.set
  reuse_processed_subjects: 'No'
  save_processed_subjects: 'Yes'
  reuse_transformed: 'No'
  save_transformed: 'Yes'
  reuse_transformed_across_experiments: 'No'
  reuse_processed_subjects_across_experiments: 'No'
preprocessing:
  bands:
    Delta:
    - 0.5
    - 4
    Theta:
    - 4
    - 8
    Alpha:
    - 8
    - 12
    Beta:
    - 12
    - 30
  window_size: 3.0
  sliding_window: 0.5
  reject_by_annotation: 'Yes'
  normalize_psd: 'Yes'
  use_epoch_rejection: 'Yes'
  epoch_rejection:
    reject: 800.0
    flat: 0.3
  extreme_datapoint_removal: null
feature_extraction:
  method: welch
  features:
    per_channel_across_bands:
    - band_power
    - none
    per_channel_per_band:
    - relative_band_power
  show_intermediate_results: 'No'
  show_intermediate_counts: 'No'
  output_format: ml
feature_transformation:
  transformations:
  - ANOVA F-test
  - MinMax scaler
  synthetic: None
  minmax_range:
  - -1.0
  - 1.0
  anova_label_column: Group
  anova_label_type: categorical
  anova_selection_mode: fwe
  anova_selection_threshold: 0.05
data_transformation_strategy:
  strategy: Within-subject (intra subject split) train/test split (80/20 per subject)
    - each subject contributes to both train and test
  intra_test_train_split:
    train_ratio: 0.8
    random_seed: 42
    split_method: random
  shuffle_transformed_data: 'Yes'
pyspark:
  master: 6
  driver_memory: 6
  executor_memory: 6
  executor_cores: 2
  shuffle_partitions: 8
ray:
  search_strategies:
  - grid_search
  grid_search:
    models:
    - XGBoost
    - MLP (Neural Network)
    - KNN
    - SVM
    model_configs:
      XGBoost:
        use_default: false
        hyperparameters:
          n_estimators:
          - '100'
          max_depth:
          - '3'
          - '6'
          - '9'
          learning_rate:
          - '0.2'
          subsample:
          - '0.7'
      MLP (Neural Network):
        use_default: false
        hyperparameters:
          hidden_layer_sizes:
          - - 100
          - - 150
            - 50
          - - 200
            - 100
            - 50
          activation:
          - tanh
          alpha:
          - '0.1'
      KNN:
        use_default: false
        hyperparameters:
          n_neighbors:
          - 1
          - 7
          - 15
          weights:
          - uniform
          metric:
          - euclidean
      SVM:
        use_default: false
        hyperparameters:
          C:
          - '0.1'
          kernel:
          - linear
          - rbf
          - poly
          gamma:
          - auto
    max_concurrent_trials: 4
    cv_folds: 5
  metric: accuracy
  mode: max
  graph_data_visualization:
    save_prediction_outputs: 'Yes'
    best_models_graph: 'Yes'
    per_model_accross_hyperparameters_graph: 'Yes'
    per_model_per_hyperparameter_across_folds_graph: 'Yes'
    per_subject_analysis_graph: 'Yes'
    per_subject_top_n_models: 5
    per_subject_hyperparameter_analysis: 'Yes'
  resources:
    num_cpus: 8
    memory_gb: 16
    object_store_memory_gb: 6
    num_gpus: 0

  lpso_metadata:
    total_folds: 50
    subjects_per_group: 6
    subjects_per_group_per_fold: 3
    total_subjects: 28
    groups:
    - cntrl
    - scz
    num_groups: 2
    fold_generation_method: random_sampling
    fold_sizes:
    - 6
    folds_per_size: 50
    balance_by_group: true
    random_seed: 42
  use_lpso: true
  leaky_lpso: false
  shuffle_transformed_data: 'Yes'
pyspark:
  master: 12
  driver_memory: 36
  executor_memory: 36
  executor_cores: 12
  shuffle_partitions: 24
ray:
  search_strategies:
  - grid_search
  grid_search:
    models:
    - XGBoost
    - MLP (Neural Network)
    - KNN
    - SVM
    model_configs:
      XGBoost:
        use_default: false
        hyperparameters:
          n_estimators:
          - '100'
          max_depth:
          - '3'
          - '6'
          - '9'
          learning_rate:
          - '0.2'
          subsample:
          - '0.7'
      MLP (Neural Network):
        use_default: false
        hyperparameters:
          hidden_layer_sizes:
          - - 100
          - - 150
            - 50
          - - 200
            - 100
            - 50
          activation:
          - tanh
          alpha:
          - '0.1'
      KNN:
        use_default: false
        hyperparameters:
          n_neighbors:
          - 1
          - 7
          - 15
          weights:
          - uniform
          metric:
          - euclidean
      SVM:
        use_default: false
        hyperparameters:
          C:
          - '0.1'
          kernel:
          - linear
          - rbf
          - poly
          gamma:
          - auto
    max_concurrent_trials: 4
    cv_folds: 5
  metric: accuracy
  mode: max
  graph_data_visualization:
    save_prediction_outputs: 'Yes'
    best_models_graph: 'Yes'
    per_model_accross_hyperparameters_graph: 'Yes'
    per_model_per_hyperparameter_across_folds_graph: 'Yes'
    per_subject_analysis_graph: 'Yes'
    per_subject_top_n_models: 5
    per_subject_hyperparameter_analysis: 'Yes'
  resources:
    num_cpus: 8
    memory_gb: 16
    object_store_memory_gb: 6
    num_gpus: 0

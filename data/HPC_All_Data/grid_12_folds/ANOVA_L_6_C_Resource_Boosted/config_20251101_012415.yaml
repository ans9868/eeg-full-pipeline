ray:
  search_strategies:
  - grid_search
  grid_search:
    models:
    - XGBoost
    - MLP (Neural Network)
    - KNN
    - SVM
    model_configs:
      XGBoost:
        use_default: false
        hyperparameters:
          n_estimators:
          - '100'  # Fixed for all 3 (your data showed 100 worked well)
          max_depth:
          - '3'
          - '6'
          - '9'  # Vary tree depth (depth 6 worked great in your data!)
          learning_rate:
          - '0.2'  # Fixed for all 3
          subsample:
          - '0.7'  # Fixed for all 3
      MLP (Neural Network):
        use_default: false
        hyperparameters:
          hidden_layer_sizes:
          - - 100
          - - 150
            - 50
          - - 200
            - 100
            - 50
          activation:
          - tanh  # Fixed for all 3
          alpha:
          - '0.1'  # Fixed for all 3
      KNN:
        use_default: false
        hyperparameters:
          n_neighbors:
          - 1
          - 7
          - 15
          weights:
          - uniform  # Fixed for all 3
          metric:
          - euclidean  # Fixed for all 3
      SVM:
        use_default: false
        hyperparameters:
          C:
          - '0.1'  # Fixed for all 3 (same regularization)
          kernel:
          - linear
          - rbf
          - poly  # 3 different kernels
          gamma:
          - auto  # Fixed for all 3 (linear doesn't use gamma, poly/rbf do)
    max_concurrent_trials: 16 
    cv_folds: 5
  metric: accuracy
  mode: max
  graph_data_visualization:
    save_prediction_outputs: 'Yes'
    best_models_graph: 'Yes'
    per_model_accross_hyperparameters_graph: 'Yes'
    per_model_per_hyperparameter_across_folds_graph: 'Yes'
    per_subject_analysis_graph: 'Yes'
    per_subject_top_n_models: 3
  resources:
    num_cpus: 44
    memory_gb: 70
    object_store_memory_gb: 25
    num_gpus: 0

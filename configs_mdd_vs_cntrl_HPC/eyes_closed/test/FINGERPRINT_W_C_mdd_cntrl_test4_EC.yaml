project:
  name: FINGERPRINT_W_C_mdd_cntrl_test4_EC
  output_dir: ./data
  experiment_type: ML Fingerprinting
  subjects_or_events: subjects
  deployment_method: Singularity with Slurm
  random_seed: 42
  expose_ports: 'No'
  config_name: config_FINGERPRINT_W_C_mdd_cntrl_test4_EC.yaml
  slurm_options:
    build: --time=00:15:00 --mem=12G --cpus-per-task=2 --account=torch_pr_60_general
    pyspark: --time=00:30:00 --mem=56G --cpus-per-task=12 --account=torch_pr_60_general
    ray: --time=00:30:00 --mem=56G --cpus-per-task=12 --account=torch_pr_60_general
data_input:
  groups:
    mdd:
    - /scratch/ans9868/4244171_normalized/BIDS/sub-030/eeg/sub-030_task-eyesclosed_eeg.edf
    - /scratch/ans9868/4244171_normalized/BIDS/sub-031/eeg/sub-031_task-eyesclosed_eeg.edf
    cntrl:
    - /scratch/ans9868/4244171_normalized/BIDS/sub-001/eeg/sub-001_task-eyesclosed_eeg.edf
    - /scratch/ans9868/4244171_normalized/BIDS/sub-002/eeg/sub-002_task-eyesclosed_eeg.edf
  reuse_processed_subjects: 'Yes'
  save_processed_subjects: 'Yes'
  reuse_transformed: 'No'
  save_transformed: 'Yes'
  reuse_transformed_across_experiments: 'No'
  reuse_processed_subjects_across_experiments: 'Yes'
preprocessing:
  bands:
    Delta:
    - 0.5
    - 4
    Theta:
    - 4
    - 8
    Alpha:
    - 8
    - 12
    Beta:
    - 12
    - 30
  window_size: 3.0
  sliding_window: 0.5
  reject_by_annotation: 'Yes'
  normalize_psd: 'Yes'
  use_epoch_rejection: 'Yes'
  epoch_rejection:
    reject: 800.0
    flat: 0.3
  extreme_datapoint_removal: null
feature_extraction:
  method: welch
  features:
    per_channel_across_bands:
    - band_power
    - none
    per_channel_per_band:
    - relative_band_power
  show_intermediate_results: 'No'
  show_intermediate_counts: 'No'
  output_format: ml
feature_transformation:
  transformations:
  - MinMax scaler
  synthetic: None
  minmax_range:
  - -1.0
  - 1.0
data_transformation_strategy:
  strategy: Within-subject (intra subject split) train/test split (80/20 per subject)
    - each subject contributes to both train and test
  intra_test_train_split:
    train_ratio: 0.8
    random_seed: 42
    split_method: random
  shuffle_transformed_data: 'Yes'
pyspark:
  master: 12
  driver_memory: 36
  executor_memory: 36
  executor_cores: 12
  shuffle_partitions: 24
ray:
  search_strategies:
  - grid_search
  grid_search:
    models:
    - KNN
    model_configs:
      KNN:
        use_default: true
    max_concurrent_trials: 9
    cv_folds: 3
  metric: accuracy
  mode: max
  graph_data_visualization:
    save_prediction_outputs: 'No'
    best_models_graph: 'No'
    per_model_accross_hyperparameters_graph: 'No'
    per_model_per_hyperparameter_across_folds_graph: 'No'
    per_subject_analysis_graph: 'No'
    per_subject_top_n_models: 5
    per_subject_hyperparameter_analysis: 'No'
  resources:
    num_cpus: 12
    memory_gb: 42
    object_store_memory_gb: 8
    num_gpus: 0

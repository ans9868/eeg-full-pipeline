status = error

# RollingFile appender with rotation
appender.file.type = RollingFile
appender.file.name = FILE
# entrypoint.sh --> export LOG_FILE_PATH="/opt/bitnami/spark/logs/spark-driver-$(date +%Y-%m-%d_%H-%M).log"
appender.file.fileName = ${env:LOG_FILE_PATH}
appender.file.filePattern = ${env:LOG_FILE_PATH}.%d{yyyy-MM-dd}-%i.gz
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}: %m%n

# Rotation policies
appender.file.policies.type = Policies
# Time-based rotation (daily)
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1
appender.file.policies.time.modulate = true
# Size-based rotation (100MB per file)
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 100MB

# Cleanup policy (keep last 30 files)
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 30
appender.file.strategy.delete.type = Delete
appender.file.strategy.delete.basePath = ${env:LOG_FILE_PATH}
appender.file.strategy.delete.maxDepth = 1
appender.file.strategy.delete.ifLastModified.type = IfLastModified
appender.file.strategy.delete.ifLastModified.age = 30d

# logging levels: "ALL", "TRACE", "DEBUG", "INFO", "WARN", "ERROR", "FATAL", "OFF"
rootLogger.level = WARN 
rootLogger.appenderRefs = file
rootLogger.appender.file.ref = FILE


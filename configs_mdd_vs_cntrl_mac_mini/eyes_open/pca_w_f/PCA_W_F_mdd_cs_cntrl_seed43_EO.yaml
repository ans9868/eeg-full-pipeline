  save_transformed: 'Yes'
  reuse_transformed_across_experiments: 'No'
  reuse_processed_subjects_across_experiments: 'Yes'
preprocessing:
  bands:
    Delta:
    - 0.5
    - 4
    Theta:
    - 4
    - 8
    Alpha:
    - 8
    - 12
    Beta:
    - 12
    - 30
  window_size: 3.0
  sliding_window: 0.5
  reject_by_annotation: 'Yes'
  normalize_psd: 'Yes'
  use_epoch_rejection: 'Yes'
  epoch_rejection:
    reject: 800.0
    flat: 0.3
  extreme_datapoint_removal: null
feature_extraction:
  method: welch
  features:
    per_channel_across_bands:
    - band_power
    - none
    per_channel_per_band:
    - relative_band_power
  show_intermediate_results: 'No'
  show_intermediate_counts: 'No'
  output_format: ml
feature_transformation:
  transformations:
  - Z-score standardization
  - PCA (retain 95% variance)
  synthetic: None
data_transformation_strategy:
  strategy: Within-subject (intra subject split) train/test split (80/20 per subject)
    - each subject contributes to both train and test
  intra_test_train_split:
    train_ratio: 0.8
    random_seed: 43
    split_method: random
  shuffle_transformed_data: 'Yes'
pyspark:
  docker_shared_mem_mb: 2048
  master: 6
  driver_memory: 10
  executor_memory: 10
  executor_cores: 6
  shuffle_partitions: 16
ray:
  docker_shared_mem_mb: 4096
  search_strategies:
  - grid_search
  grid_search:
    models:
    - XGBoost
    - MLP (Neural Network)
    - KNN
    - SVM
    model_configs:
      XGBoost:
        use_default: false
        hyperparameters:
          n_estimators:
          - '100'
          max_depth:
          - '3'
          - '6'
          - '9'
          learning_rate:
          - '0.2'
          subsample:
          - '0.7'
      MLP (Neural Network):
        use_default: false
        hyperparameters:
          hidden_layer_sizes:
          - - 100
          - - 150
            - 50
          - - 200
            - 100
            - 50
          activation:
          - tanh
          alpha:
          - '0.1'
      KNN:
        use_default: false
        hyperparameters:
          n_neighbors:
          - 1
          - 7
          - 15
          weights:
          - uniform
          metric:
          - euclidean
      SVM:
        use_default: false
        hyperparameters:
          C:
          - '0.1'
          kernel:
          - linear
          - rbf
          - poly
          gamma:
          - auto
    max_concurrent_trials: 4
    cv_folds: 5
  metric: accuracy
  mode: max
  graph_data_visualization:
    save_prediction_outputs: 'Yes'
    best_models_graph: 'Yes'
    per_model_accross_hyperparameters_graph: 'Yes'
    per_model_per_hyperparameter_across_folds_graph: 'Yes'
    per_subject_analysis_graph: 'Yes'
    per_subject_top_n_models: 5
    per_subject_hyperparameter_analysis: 'Yes'
  resources:
    num_cpus: 6
    memory_gb: 12
    object_store_memory_gb: 4
    num_gpus: 0

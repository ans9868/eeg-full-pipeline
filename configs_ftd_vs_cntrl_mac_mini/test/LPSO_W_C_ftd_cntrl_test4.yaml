project:
  name: LPSO_W_C_ftd_cntrl_test4
  output_dir: ./data
  experiment_type: ML Classification
  subjects_or_events: subjects
  deployment_method: Docker
  random_seed: 42
  expose_ports: 'No'
  config_name: config_LPSO_W_C_ftd_cntrl_test4.yaml

data_input:
  groups:
    ftd:
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-066/eeg/sub-066_task-eyesclosed_eeg.set
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-067/eeg/sub-067_task-eyesclosed_eeg.set
    cntrl:
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-037/eeg/sub-037_task-eyesclosed_eeg.set
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-038/eeg/sub-038_task-eyesclosed_eeg.set
  reuse_processed_subjects: 'Yes'
  save_processed_subjects: 'Yes'
  reuse_transformed: 'Yes'
  save_transformed: 'Yes'
  reuse_transformed_across_experiments: 'No'
  reuse_processed_subjects_across_experiments: 'Yes'
preprocessing:
  bands:
    Delta: [0.5, 4]
    Theta: [4, 8]
    Alpha: [8, 12]
    Beta: [12, 30]
  window_size: 3.0
  sliding_window: 0.5
  reject_by_annotation: 'Yes'
  normalize_psd: 'Yes'
  use_epoch_rejection: 'Yes'
  epoch_rejection:
    reject: 800.0
    flat: 0.3
  extreme_datapoint_removal: null

feature_extraction:
  method: welch
  features:
    per_channel_across_bands:
    - band_power
    - none
    per_channel_per_band:
    - relative_band_power
  show_intermediate_results: 'No'
  show_intermediate_counts: 'No'
  output_format: ml

feature_transformation:
  transformations:
  - ANOVA F-test
  - MinMax scaler
  synthetic: None
  minmax_range: [-1.0, 1.0]
  anova_label_column: Group
  anova_label_type: categorical
  anova_selection_mode: fwe
  anova_selection_threshold: 0.05

data_transformation_strategy:
  strategy: LPSO (Leave-P-Subjects-Out) (inter subject split) - systematic cross-validation (recommended for small datasets)
  lpso_subjects_per_group: 2
  uneven_handling: cutoff
  lpso_folds:
  - - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-066/eeg/sub-066_task-eyesclosed_eeg.set
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-037/eeg/sub-037_task-eyesclosed_eeg.set
  - - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-066/eeg/sub-066_task-eyesclosed_eeg.set
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-038/eeg/sub-038_task-eyesclosed_eeg.set
  - - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-067/eeg/sub-067_task-eyesclosed_eeg.set
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-037/eeg/sub-037_task-eyesclosed_eeg.set
  - - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-067/eeg/sub-067_task-eyesclosed_eeg.set
    - /Volumes/CrucialX6/Home/projects/eeg-ds004504/ds004504/sub-038/eeg/sub-038_task-eyesclosed_eeg.set
  lpso_metadata:
    total_folds: 4
    subjects_per_group: 2
    subjects_per_group_per_fold: 1
    total_subjects: 4
    groups:
    - ftd
    - cntrl
    num_groups: 2
    fold_generation_method: random_sampling
    fold_sizes:
    - 2
    folds_per_size: 4
    balance_by_group: true
    random_seed: 42
  use_lpso: true
  leaky_lpso: false
  shuffle_transformed_data: 'Yes'

pyspark:
  docker_shared_mem_mb: 2048
  master: 6
  driver_memory: 10
  executor_memory: 10
  executor_cores: 6
  shuffle_partitions: 16

ray:
  docker_shared_mem_mb: 4096
  search_strategies:
  - grid_search
  grid_search:
    models:
    - KNN
    model_configs:
      KNN:
        use_default: true
    max_concurrent_trials: 4
    cv_folds: 3
  metric: accuracy
  mode: max
  graph_data_visualization:
    save_prediction_outputs: 'No'
    best_models_graph: 'No'
    per_model_accross_hyperparameters_graph: 'No'
    per_model_per_hyperparameter_across_folds_graph: 'No'
    per_subject_analysis_graph: 'No'
    per_subject_top_n_models: 5
    per_subject_hyperparameter_analysis: 'No'
  resources:
    num_cpus: 6
    memory_gb: 12
    object_store_memory_gb: 4
    num_gpus: 0
